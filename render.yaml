# Render Blueprint for CardSync AI FastAPI backend
# Dashboard: New > Blueprint or link repo and select this file.
services:
  - type: web
    name: cardsync-ai-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    rootDir: backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8000"
      - key: HOST
        value: "0.0.0.0"
      - key: RELOAD
        value: "false"
      - key: FRONTEND_URL
        value: https://cardsyncai.netlify.app
      - key: ALLOWED_ORIGINS
        value: https://cardsyncai.netlify.app,http://localhost:5173,http://127.0.0.1:5173

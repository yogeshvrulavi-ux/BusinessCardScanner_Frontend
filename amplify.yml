version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm install 22
        - nvm use 22
        - npm install
    build:
      commands:
        # VITE_API_URL must come from Amplify Console → Hosting → Environment variables.
        # Never hardcode the API origin here or in app source.
        - |
          if [ -z "$VITE_API_URL" ]; then
            echo "ERROR: VITE_API_URL is not set."
            echo "Add it in Amplify Console → App settings → Environment variables"
            echo "Example: VITE_API_URL=https://api.namecardscan.com"
            exit 1
          fi
          echo "Building with VITE_API_URL from Amplify environment"
          AMPLIFY=1 npm run build
        # TanStack Start SPA mode emits the prerendered shell as _shell.html with
        # server-pass asset hashes. Publish it as index.html and repoint any stale
        # asset refs to the files actually present in dist/client/assets.
        - node scripts/fix-amplify-shell.mjs
  artifacts:
    baseDirectory: dist/client
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
  customHeaders:
    - pattern: "assets/**/*"
      headers:
        - key: "Cache-Control"
          value: "public, max-age=31536000, immutable"
    - pattern: "tessdata/**/*"
      headers:
        - key: "Cache-Control"
          value: "public, max-age=31536000, immutable"
    - pattern: "paddleocr/**/*"
      headers:
        - key: "Cache-Control"
          value: "public, max-age=31536000, immutable"
    - pattern: "*.html"
      headers:
        - key: "Cache-Control"
          value: "no-cache, no-store, must-revalidate"
# SPA deep-link fallback: serve index.html for client routes (not real files)
customRules:
  - source: "</^[^.]+$|\\.(?!(css|gif|ico|jpg|jpeg|png|txt|svg|woff|woff2|ttf|map|json|webp|wasm|html|js)$)([^.]+$)/>"
    target: /index.html
    status: "200"

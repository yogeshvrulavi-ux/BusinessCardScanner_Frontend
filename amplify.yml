version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm install 22
        - nvm use 22
        - npm ci
    build:
      commands:
        - AMPLIFY=1 npm run build
  artifacts:
    baseDirectory: dist/client
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
  customHeaders:
    - pattern: "assets/**/*"
      headers:
        - key: "Cache-Control"
          value: "public, max-age=31536000, immutable"
    - pattern: "tessdata/**/*"
      headers:
        - key: "Cache-Control"
          value: "public, max-age=31536000, immutable"
    - pattern: "*.html"
      headers:
        - key: "Cache-Control"
          value: "no-cache, no-store, must-revalidate"

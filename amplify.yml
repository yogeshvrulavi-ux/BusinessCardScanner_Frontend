version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm install 22
        - nvm use 22
        - npm install
    build:
      commands:
        - AMPLIFY=1 npm run build
        # TanStack Start SPA mode emits the prerendered shell as _shell.html with
        # server-pass asset hashes. Publish it as index.html and repoint any stale
        # asset refs to the files actually present in dist/client/assets.
        - node scripts/fix-amplify-shell.mjs
  artifacts:
    baseDirectory: dist/client
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
  customHeaders:
    - pattern: "assets/**/*"
      headers:
        - key: "Cache-Control"
          value: "public, max-age=31536000, immutable"
    - pattern: "tessdata/**/*"
      headers:
        - key: "Cache-Control"
          value: "public, max-age=31536000, immutable"
    - pattern: "paddleocr/**/*"
      headers:
        - key: "Cache-Control"
          value: "public, max-age=31536000, immutable"
    - pattern: "*.html"
      headers:
        - key: "Cache-Control"
          value: "no-cache, no-store, must-revalidate"
# SPA deep-link fallback: serve index.html for client routes (not real files)
customRules:
  - source: "</^[^.]+$|\\.(?!(css|gif|ico|jpg|jpeg|png|txt|svg|woff|woff2|ttf|map|json|webp|wasm|html|js)$)([^.]+$)/>"
    target: /index.html
    status: "200"

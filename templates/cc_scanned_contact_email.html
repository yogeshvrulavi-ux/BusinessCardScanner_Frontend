<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="x-apple-disable-message-reformatting" />
  <title>{{SUBJECT}}</title>
</head>
<body style="margin:0;padding:0;background-color:#eef2f7;font-family:Arial,Helvetica,sans-serif;-webkit-text-size-adjust:100%;-ms-text-size-adjust:100%;">
  <div style="display:none;max-height:0;overflow:hidden;mso-hide:all;">
    Scanned contact details from {{COMPANY}}.
  </div>
  <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="background-color:#eef2f7;border-collapse:collapse;">
    <tr>
      <td align="center" style="padding:32px 16px;">
        <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="600" style="max-width:600px;width:100%;border-collapse:collapse;">
          <tr>
            <td style="background-color:{{BRAND_PRIMARY}};border-radius:12px 12px 0 0;padding:24px 36px;">
              <p style="margin:0 0 6px;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.85);font-weight:600;">
                {{COMPANY}}
              </p>
              <h1 style="margin:0;font-size:22px;line-height:1.3;font-weight:700;color:#ffffff;">
                Scanned Contact Details
              </h1>
            </td>
          </tr>
          <tr>
            <td style="background-color:#ffffff;border-left:1px solid {{BRAND_BORDER}};border-right:1px solid {{BRAND_BORDER}};padding:28px 36px;">
              <p style="margin:0 0 20px;font-size:14px;line-height:1.6;color:{{BRAND_MUTED}};">
                A business card was scanned and saved. Details captured from the card are below.
              </p>
              <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="border-collapse:collapse;background-color:{{BRAND_SURFACE}};border:1px solid {{BRAND_BORDER}};border-radius:8px;">
                {{DETAIL_ROWS}}
              </table>
            </td>
          </tr>
          <tr>
            <td align="center" style="background-color:{{BRAND_SURFACE}};border:1px solid {{BRAND_BORDER}};border-top:none;border-radius:0 0 12px 12px;padding:20px 36px;font-size:12px;line-height:1.5;color:{{BRAND_MUTED}};">
              &copy; {{YEAR}} {{COMPANY}}. Internal notification — CC copy of scanned contact data.
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
